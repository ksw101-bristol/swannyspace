<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup 2026 · Knockout Stage</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap');
  :root{--navy:#0d1b3e;--navy-dark:#081229;--gold:#e0a526;--chalk:#f4f1e8;--line:rgba(224,165,38,0.2);}
  *{box-sizing:border-box;}
  html{background:var(--navy);color-scheme:dark;}
  body{margin:0;font-family:'Inter',sans-serif;background:var(--navy)!important;background-image:repeating-linear-gradient(0deg,rgba(224,165,38,0.03) 0px,rgba(224,165,38,0.03) 40px,transparent 40px,transparent 80px);color:var(--chalk)!important;min-height:100vh;padding:32px 20px 64px;}
  .wrap{max-width:540px;margin:0 auto;}
  .back-link{display:inline-flex;align-items:center;gap:8px;font-family:'Space Mono',monospace;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:rgba(224,165,38,0.6);text-decoration:none;margin-bottom:32px;}
  .back-link:hover{color:var(--gold);}
  header{margin-bottom:36px;}
  .kicker{font-family:'Space Mono',monospace;font-size:12px;letter-spacing:0.18em;text-transform:uppercase;color:var(--gold);margin:0 0 10px;}
  h1{font-family:'Archivo Black',sans-serif;font-size:clamp(2rem,8vw,3.2rem);line-height:1.05;margin:0 0 10px;text-transform:uppercase;letter-spacing:-0.01em;}
  header p{font-size:14px;line-height:1.6;color:rgba(244,241,232,0.65);margin:0;}
  nav{display:flex;flex-direction:column;gap:12px;}
  .nav-btn{display:flex;align-items:center;justify-content:space-between;text-decoration:none;background:rgba(224,165,38,0.06);border:1px solid var(--line);border-radius:4px;padding:20px 22px;transition:background 0.15s ease,border-color 0.15s ease;}
  .nav-btn:hover{background:rgba(224,165,38,0.1);border-color:var(--gold);}
  .label-group{display:flex;flex-direction:column;gap:3px;}
  .eyebrow{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--gold);}
  .title{font-family:'Archivo Black',sans-serif;font-size:1.15rem;text-transform:uppercase;color:var(--chalk);line-height:1.15;}
  .deadline{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:0.06em;color:rgba(244,241,232,0.4);margin-top:2px;}
  .arrow{font-size:1.4rem;color:rgba(224,165,38,0.5);}
  .nav-btn:hover .arrow{color:var(--gold);}
  footer{margin-top:48px;text-align:center;font-family:'Space Mono',monospace;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:rgba(224,165,38,0.25);}
</style>
</head>
<body>
<div class="wrap">
  <a class="back-link" href="index.html">← Back to home</a>
  <header>
    <p class="kicker">Knockout Stage · World Cup 2026</p>
    <h1>Knockout Competition</h1>
    <p>32 games, 7 rounds — from the Last 32 to the Final. Submit your predictions before each deadline.</p>
  </header>
  <nav>
    <a class="nav-btn" href="ko-r32-part1.html">
      <div class="label-group">
        <span class="eyebrow">Submit Picks</span>
        <span class="title">Round of 32 · Part 1</span>
        <span class="deadline">Games 1–6 · Deadline 6pm Sun 28th June</span>
      </div>
      <span class="arrow">→</span>
    </a>
  </nav>
  <footer>World Cup 2026 · Knockout Stage · Prediction League</footer>
</div>
</body>
</html>
