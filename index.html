<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Swanny's World Cup 2026 · Prediction League</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap');
  :root{--grass:#1f4d2c;--navy:#0d1b3e;--gold:#e0a526;--chalk:#f4f1e8;}
  *{box-sizing:border-box;margin:0;padding:0;}
  html{height:100%;}
  body{font-family:'Inter',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(160deg,var(--grass) 0%,#0a1f10 50%,var(--navy) 100%);padding:32px 20px;color:var(--chalk);}
  .logo{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:rgba(244,241,232,0.4);margin-bottom:12px;text-align:center;}
  h1{font-family:'Archivo Black',sans-serif;font-size:clamp(2.2rem,9vw,4rem);text-transform:uppercase;letter-spacing:-0.02em;line-height:1.05;text-align:center;margin-bottom:8px;}
  .trophy{font-size:clamp(2.5rem,8vw,4rem);margin-bottom:16px;text-align:center;}
  .subtitle{font-family:'Space Mono',monospace;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;color:var(--gold);text-align:center;margin-bottom:48px;}
  .buttons{display:flex;flex-direction:column;gap:16px;width:100%;max-width:480px;}
  .comp-btn{display:flex;align-items:center;justify-content:space-between;text-decoration:none;border-radius:6px;padding:28px;transition:transform 0.15s ease,box-shadow 0.15s ease;position:relative;overflow:hidden;}
  .comp-btn:hover{transform:translateY(-2px);}
  .comp-btn.gs{background:var(--grass);border:2px solid rgba(244,241,232,0.2);box-shadow:0 4px 24px rgba(0,0,0,0.3);}
  .comp-btn.gs:hover{box-shadow:0 8px 32px rgba(0,0,0,0.4);border-color:rgba(244,241,232,0.35);}
  .comp-btn.ko{background:var(--navy);border:2px solid rgba(224,165,38,0.3);box-shadow:0 4px 24px rgba(0,0,0,0.3);}
  .comp-btn.ko:hover{box-shadow:0 8px 32px rgba(13,27,62,0.6);border-color:var(--gold);}
  .btn-content{flex:1;}
  .btn-eyebrow{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:0.16em;text-transform:uppercase;margin-bottom:6px;}
  .comp-btn.gs .btn-eyebrow{color:rgba(244,241,232,0.5);}
  .comp-btn.ko .btn-eyebrow{color:var(--gold);}
  .btn-title{font-family:'Archivo Black',sans-serif;font-size:clamp(1.3rem,5vw,1.7rem);text-transform:uppercase;letter-spacing:-0.01em;color:var(--chalk);line-height:1.1;margin-bottom:6px;}
  .btn-sub{font-family:'Inter',sans-serif;font-size:13px;color:rgba(244,241,232,0.5);line-height:1.4;}
  .btn-arrow{font-size:1.8rem;color:rgba(244,241,232,0.4);margin-left:16px;flex-shrink:0;transition:color 0.15s ease;}
  .comp-btn:hover .btn-arrow{color:var(--gold);}
  .badge{display:inline-block;font-family:'Space Mono',monospace;font-size:9px;letter-spacing:0.1em;text-transform:uppercase;padding:2px 8px;border-radius:2px;margin-top:6px;}
  .badge.complete{background:rgba(63,163,77,0.2);color:#5dc96d;}
  .badge.live{background:rgba(224,165,38,0.2);color:var(--gold);}.badge.pending{background:rgba(244,241,232,0.08);color:rgba(244,241,232,0.45);}
  footer{margin-top:48px;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:rgba(244,241,232,0.2);text-align:center;}
</style>
</head>
<body>
  <div class="logo">Swannyspace.com</div>
  <div class="trophy">🏆</div>
  <h1>World Cup 2026</h1>
  <p class="subtitle">Prediction League</p>

  <div class="buttons">
    <a class="comp-btn gs" href="gs-index.html">
      <div class="btn-content">
        <div class="btn-eyebrow">72 games · 15 players</div>
        <div class="btn-title">Group Stage Competition</div>
        <div class="btn-sub">Rounds 1–5 · Results coming in</div>
        <span class="badge live">● Live</span>
      </div>
      <div class="btn-arrow">→</div>
    </a>

    <a class="comp-btn ko" href="ko-index.html">
      <div class="btn-content">
        <div class="btn-eyebrow">32 games · 15 players</div>
        <div class="btn-title">Knockout Stage Competition</div>
        <div class="btn-sub">Round of 32 · Starting soon</div>
        <span class="badge pending">Pending</span>
      </div>
      <div class="btn-arrow">→</div>
    </a>
  </div>

  <footer>World Cup 2026 · Swanny's Prediction League</footer>
</body>
</html>
